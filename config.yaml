# Known-Blocks Configuration
# An LLMBase instance for autonomous blockchain/DeFi knowledge learning.
#
# LLM provider is configured via .env file:
#   LLMBASE_API_KEY, LLMBASE_BASE_URL, LLMBASE_MODEL
# See .env.example for setup instructions.

llm:
  max_tokens: 8192

paths:
  raw: "./raw"
  wiki: "./wiki"
  outputs: "./wiki/outputs"
  meta: "./wiki/_meta"
  concepts: "./wiki/concepts"
  data: "./data"

compile:
  batch_size: 10
  backlinks: true

search:
  port: 5555

lint:
  web_search: false

worker:
  enabled: false
  learn_interval_hours: 4
  compile_interval_hours: 1
  taxonomy_interval_hours: 12
  health_check_interval_hours: 24
  learn_batch_size: 5
  learn_source: orchestrator

health:
  auto_fix_broken_links: true
  max_stubs_per_run: 10

entities:
  enabled: false
  extract_interval_hours: 24

# ─── Blockchain-specific sources ────────────────────────────

spellbook:
  path: "/Users/hosuke/Connector/Python/spellbook"

defillama:
  min_tvl: 1000000
  top_n: 50

orchestrator:
  curiosity_ratio: 0.2
